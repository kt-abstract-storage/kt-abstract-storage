name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.platform }} tests
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: native-linux
            os: ubuntu-latest
            java: "17"
            allow_failure: false
            gradle_cmd: ./gradlew
            gradle_tasks: >-
              :commonLib:linuxX64Test
              :storage-common-tests:linuxX64Test
            android: false
          - platform: native-macos
            os: macos-latest
            java: "17"
            allow_failure: true
            gradle_cmd: ./gradlew
            gradle_tasks: >-
              :commonLib:iosSimulatorArm64Test
              :storage-common-tests:iosSimulatorArm64Test
            android: false
          - platform: native-windows
            os: windows-latest
            java: "17"
            allow_failure: false
            gradle_cmd: .\gradlew.bat
            gradle_tasks: >-
              :commonLib:mingwX64Test
              :storage-common-tests:mingwX64Test
            android: false
          - platform: jvm
            os: ubuntu-latest
            java: "17"
            allow_failure: false
            gradle_cmd: ./gradlew
            gradle_tasks: >-
              :storage-jvm-core:test
              :storage-jvm-nio:test
              :storage-kotlinx-io-files:test
            android: false
          - platform: android
            os: ubuntu-latest
            java: "17"
            allow_failure: false
            gradle_cmd: ./gradlew
            gradle_tasks: >-
              :storage-android:check
            android: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        if: ${{ matrix.android }}
        uses: android-actions/setup-android@v3

      - name: Install Android API 36 packages
        if: ${{ matrix.android }}
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Run tests
        run: ${{ matrix.gradle_cmd }} --stacktrace --no-daemon ${{ matrix.gradle_tasks }}




